spring.application.name=rosettix

# JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# MongoDB Configuration (Legacy - for Spring Boot auto-config)
spring.data.mongodb.uri=mongodb://localhost:27017/test
spring.data.mongodb.database=test

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Gemini API Configuration
google.api.key=${GOOGLE_API_KEY}
rosettix.llm.model-name=gemini-2.5-flash

# Schema Cache Configuration
rosettix.schema-cache.enabled=true
rosettix.schema-cache.ttl-minutes=5

# Generated Query Cache Configuration
rosettix.query.caching-enabled=true
rosettix.query.cache-ttl-minutes=30
